# Architecture 3 training config
# Edit values here; pass path with --config or rely on the default location.

# --- data ---
T: 31
in_dim: 2
data_path: data/belief_train.csv

# --- transformer ---
d_model: 128
n_heads: 8
n_layers: 4
d_ff: 512
dropout: 0.1

# --- state z_t ---
d_z: 64

# --- decoder MLP ---
d_dec_hidden: 128

# --- training ---
batch_size: 16
lr: 0.0003
weight_decay: 0.01
grad_clip: 1.0
n_epochs: 3
device: auto
seed: 0
checkpoint_path: runs/belief/belief_model.pt

# --- heads ---
enable_true_prob_head: true
true_prob_loss_weight: 0.4
